<!--
  Schrödinger vs. Diffusion — Why the i Matters
  Book: Quantum Mechanics — A Companion Guide · Chapter: 03-the-schrodinger-equation · Figure: 01
-->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Schrödinger Evolution vs. Diffusion — The Role of i</title>
  <desc>Two side-by-side panels: left shows Schrödinger evolution as three Gaussian curves (Blue) spreading over time while preserving the coherent packet shape; right shows diffusion equation as three Gaussian curves (Vermillion) spreading and decaying in amplitude irreversibly. Same initial Gaussian in both. Y-axis at zero, identical x-axis range.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="03-the-schrodinger-equation" figure-number="01" figure-title="Schrödinger vs. Diffusion" figure-slug="schrodinger-vs-diffusion" figure-type="comparison" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/03-the-schrodinger-equation-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Schrödinger Spreads Coherently — Diffusion Smooths Irreversibly</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">The factor of i in iℏ∂ψ/∂t makes time evolution unitary (norm-preserving). Without i, the same operator decays.</text>

  <!-- Panel divider -->
  <line x1="350" y1="80" x2="350" y2="380" stroke="#000000" stroke-width="0.5"/>

  <!-- Left panel: Schrödinger (Blue) -->
  <text x="180" y="98" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">Schrödinger: iℏ ∂ψ/∂t = Ĥψ</text>
  <line x1="60" y1="340" x2="340" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="60" y1="120" x2="60" y2="340" stroke="#2a1a0e" stroke-width="1"/>

  <!-- Three Gaussian curves: tall narrow, medium, wide -->
  <!-- t=0 sharp -->
  <path d="M 80 340 Q 180 -80 280 340" stroke="#0072B2" stroke-width="1.2" fill="none" stroke-dasharray="2 2"/>
  <!-- t=t1 wider, same area -->
  <path d="M 80 340 Q 110 280 140 220 Q 180 130 220 220 Q 250 280 280 340 Z" fill="#0072B2" fill-opacity="0.08" stroke="none"/>
  <path d="M 80 340 Q 110 280 140 220 Q 180 130 220 220 Q 250 280 280 340" stroke="#0072B2" stroke-width="1.6" fill="none"/>
  <!-- t=t2 widest -->
  <path d="M 70 340 Q 130 270 180 205 Q 230 270 290 340 Z" fill="#0072B2" fill-opacity="0.08" stroke="none"/>
  <path d="M 70 340 Q 130 270 180 205 Q 230 270 290 340" stroke="#0072B2" stroke-width="2" fill="none"/>

  <text x="150" y="120" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">t=0</text>
  <text x="228" y="210" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">t=t₁</text>
  <text x="295" y="255" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">t=t₂</text>

  <text x="180" y="368" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">|ψ|<tspan baseline-shift="super" font-size="8">2</tspan> spreads — total area conserved</text>

  <!-- Right panel: Diffusion (Vermillion) -->
  <text x="525" y="98" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#D55E00">Diffusion: ∂u/∂t = D ∂<tspan baseline-shift="super" font-size="8">2</tspan>u/∂x<tspan baseline-shift="super" font-size="8">2</tspan></text>
  <line x1="400" y1="340" x2="680" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="400" y1="120" x2="400" y2="340" stroke="#2a1a0e" stroke-width="1"/>

  <!-- t=0 sharp same as left -->
  <path d="M 420 340 Q 520 -80 620 340" stroke="#D55E00" stroke-width="1.2" fill="none" stroke-dasharray="2 2"/>
  <!-- t=t1 lower, wider -->
  <path d="M 420 340 Q 470 250 520 200 Q 570 250 620 340 Z" fill="#D55E00" fill-opacity="0.08" stroke="none"/>
  <path d="M 420 340 Q 470 250 520 200 Q 570 250 620 340" stroke="#D55E00" stroke-width="1.6" fill="none"/>
  <!-- t=t2 much lower, much wider -->
  <path d="M 410 340 Q 480 310 520 295 Q 570 310 630 340 Z" fill="#D55E00" fill-opacity="0.08" stroke="none"/>
  <path d="M 410 340 Q 480 310 520 295 Q 570 310 630 340" stroke="#D55E00" stroke-width="2" fill="none"/>

  <text x="490" y="120" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">t=0</text>
  <text x="575" y="210" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">t=t₁</text>
  <text x="635" y="300" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">t=t₂</text>

  <text x="525" y="368" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">u decays — area shrinks irreversibly</text>

  <text x="350" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Drop the i, and reversible quantum mechanics becomes classical heat flow.</text>
</svg>
