<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Level Repulsion — Avoided Crossing under Perturbation</title>
  <desc>Plot of energy versus perturbation strength λ. Two dashed gray reference lines (unperturbed levels) would cross at λ_c. Solid curves (the actual eigenvalues) — vermillion above, blue below — bend away from each other near λ_c without crossing. Minimum gap at λ_c labeled 2|⟨a|H'|b⟩|. Push arrows on either side show upper-up and lower-down repulsion.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="09-approximation-methods" figure-number="01" figure-title="Level Repulsion" figure-slug="level-repulsion" figure-type="conceptual" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/09-approximation-methods-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Avoided Crossing — Levels Repel Where They Would Otherwise Cross</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Off-diagonal matrix element opens a gap of 2|⟨a|H'|b⟩| — the closer the unperturbed levels, the bigger the repulsion's effect.</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="660" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <text x="668" y="384" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">λ</text>
  <text x="92" y="98" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">E</text>

  <!-- Unperturbed reference lines (dashed) — would cross at x=380 -->
  <line x1="100" y1="320" x2="660" y2="160" stroke="#aaa" stroke-width="0.8" stroke-dasharray="6 4"/>
  <line x1="100" y1="160" x2="660" y2="320" stroke="#aaa" stroke-width="0.8" stroke-dasharray="6 4"/>

  <!-- Avoided crossing curves — actual eigenvalues -->
  <!-- Upper eigenvalue (vermillion) -->
  <path d="M 100 160 C 220 170 330 200 380 215 C 430 200 540 170 660 160" stroke="#D55E00" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Lower eigenvalue (blue) -->
  <path d="M 100 320 C 220 310 330 280 380 265 C 430 280 540 310 660 320" stroke="#0072B2" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Gap markers at center -->
  <line x1="380" y1="215" x2="380" y2="265" stroke="#C8860E" stroke-width="1.5"/>
  <line x1="375" y1="215" x2="385" y2="215" stroke="#C8860E" stroke-width="1.5"/>
  <line x1="375" y1="265" x2="385" y2="265" stroke="#C8860E" stroke-width="1.5"/>
  <text x="395" y="245" font-family="'JetBrains Mono', monospace" font-size="10" fill="#C8860E">2|⟨a|H'|b⟩|</text>

  <!-- Push arrows -->
  <text x="280" y="125" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">↑ pushed up</text>
  <text x="280" y="370" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">↓ pushed down</text>

  <!-- Legend -->
  <rect x="500" y="326" width="160" height="50" fill="#FFFFFF" stroke="#aaa" stroke-width="0.5"/>
  <line x1="510" y1="341" x2="540" y2="341" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="545" y="345" font-family="'JetBrains Mono', monospace" font-size="9" fill="#aaa">unperturbed</text>
  <line x1="510" y1="361" x2="540" y2="361" stroke="#0072B2" stroke-width="2.4"/>
  <text x="545" y="365" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">eigenvalues</text>

  <text x="380" y="395" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Near-degenerate levels never quite touch — coupling lifts them apart.</text>
</svg>
