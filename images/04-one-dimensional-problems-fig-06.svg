  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Gamow's Triumph — A Straight Line Across 30 Powers of Ten</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">log τ ∝ 1/√E. Tunneling probability is exponentially sensitive to barrier penetration depth.</text>

