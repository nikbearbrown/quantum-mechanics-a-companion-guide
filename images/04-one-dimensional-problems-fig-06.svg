<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Geiger-Nuttall — log(half-life) vs 1/√E Across 24 Orders of Magnitude</title>
  <desc>Scatter plot: vertical axis log₁₀(half-life in seconds) from −6 to +24, horizontal axis 1/√E with E in MeV. About 10 alpha-emitting nuclei plotted as blue dots along a straight-line trend. Labeled examples at endpoints: Po-212 at lower-left (microseconds), U-238 and Th-232 at upper-right (billions of years).</desc>
