  <path d="M 80 160 Q 220 105 300 108 Q 460 115 660 160" stroke="#0072B2" stroke-width="2" fill="none"/>

  <text x="40" y="220" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">t = T/4</text>
  <line x1="80" y1="280" x2="660" y2="280" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="80" y1="220" x2="80" y2="280" stroke="#000000" stroke-width="2"/>
  <line x1="660" y1="220" x2="660" y2="280" stroke="#000000" stroke-width="2"/>
  <path d="M 80 280 Q 370 100 660 280" stroke="#0072B2" stroke-width="2" fill="none"/>

  <text x="40" y="340" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">t = T/2</text>
  <line x1="80" y1="400" x2="660" y2="400" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="80" y1="340" x2="80" y2="400" stroke="#000000" stroke-width="2"/>
  <line x1="660" y1="340" x2="660" y2="400" stroke="#000000" stroke-width="2"/>
  <path d="M 80 400 Q 260 360 380 300 Q 500 230 660 400" stroke="#0072B2" stroke-width="2" fill="none"/>

  <text x="80" y="418" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">x = 0</text>
  <text x="660" y="418" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">x = L</text>

  <text x="370" y="448" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Period T = 2π ℏ / (E₂ − E₁) — the oscillation that becomes a spectral line.</text>
