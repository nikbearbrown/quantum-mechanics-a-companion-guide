<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">|ψ(x,t)|² for ψ = (ψ₁ + ψ₂)/√2 at Three Times — The Probability Density Sloshes</title>
  <desc>Three stacked panels: |ψ|² at t=0 (sin² peaked center), t=T/4 (asymmetric pushed left), t=T/2 (asymmetric pushed right), over the infinite well [0, L]. The pattern sloshes back and forth at Bohr period T = 2π ℏ / (E₂−E₁). Walls at x=0 and x=L marked.</desc>
