  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">|ψ(x, t)|<tspan baseline-shift="super" font-size="9">2</tspan> for ψ = (ψ₁ + ψ₂)/√2 — Probability Sloshes at Bohr Frequency</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Each panel is a snapshot. The interference cross-term ψ₁* ψ₂ + ψ₂* ψ₁ oscillates at ω = (E₂ − E₁)/ℏ.</text>

  <text x="40" y="100" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">t = 0</text>
