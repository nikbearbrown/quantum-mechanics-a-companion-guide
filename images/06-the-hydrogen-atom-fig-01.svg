<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Hydrogen Visible Spectrum — Balmer Series</title>
  <desc>Visible-spectrum horizontal strip from 400 nm to 700 nm with a continuous color gradient as the background reference. Four sharp vertical lines mark the Balmer-series emissions: Hα at 656 nm (red), Hβ at 486 nm (cyan), Hγ at 434 nm (violet), Hδ at 410 nm (deep violet). Each line labeled with its transition n → 2.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="06-the-hydrogen-atom" figure-number="01" figure-title="Hydrogen Emission Spectrum" figure-slug="hydrogen-emission-spectrum" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/06-the-hydrogen-atom-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="380" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Hydrogen Visible Emission Lines — Balmer Series (n → 2)</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Wavelengths 656, 486, 434, 410 nm. Predicted by Rydberg formula 1/λ = R(1/4 − 1/n²); derived from Bohr 1913.</text>

  <!-- Spectrum gradient background -->
  <defs>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5500AA"/>
      <stop offset="15%" stop-color="#3300EE"/>
      <stop offset="30%" stop-color="#00CCFF"/>
      <stop offset="50%" stop-color="#00FF00"/>
      <stop offset="70%" stop-color="#FFFF00"/>
      <stop offset="85%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#EE0000"/>
    </linearGradient>
  </defs>
  <rect x="80" y="120" width="560" height="100" fill="url(#spec)" stroke="#000" stroke-width="1"/>

  <!-- Mapping: x = 80 + (λ - 400) / 300 × 560 -->
  <!-- Hα at 656 nm: x = 80 + 256/300 × 560 = 80 + 477.9 = 558 -->
  <!-- Hβ at 486 nm: x = 80 + 86/300 × 560 = 80 + 160.5 = 241 -->
  <!-- Hγ at 434 nm: x = 80 + 34/300 × 560 = 80 + 63.5 = 144 -->
  <!-- Hδ at 410 nm: x = 80 + 10/300 × 560 = 80 + 18.7 = 99 -->

  <line x1="558" y1="120" x2="558" y2="220" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="241" y1="120" x2="241" y2="220" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="144" y1="120" x2="144" y2="220" stroke="#FFFFFF" stroke-width="3.5"/>
  <line x1="99" y1="120" x2="99" y2="220" stroke="#FFFFFF" stroke-width="3.5"/>

  <!-- Line labels -->
  <text x="558" y="248" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">Hα</text>
  <text x="558" y="264" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">656 nm</text>
  <text x="558" y="278" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">n=3→2</text>

  <text x="241" y="248" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">Hβ</text>
  <text x="241" y="264" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">486 nm</text>
  <text x="241" y="278" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">n=4→2</text>

  <text x="144" y="248" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">Hγ</text>
  <text x="144" y="264" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">434 nm</text>
  <text x="144" y="278" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">n=5→2</text>

  <text x="99" y="248" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">Hδ</text>
  <text x="99" y="264" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">410 nm</text>

  <!-- Axis ticks -->
  <line x1="80" y1="220" x2="640" y2="220" stroke="#2a1a0e" stroke-width="1"/>
  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">
    <text x="80" y="306" text-anchor="middle">400</text>
    <text x="173" y="306" text-anchor="middle">450</text>
    <text x="267" y="306" text-anchor="middle">500</text>
    <text x="360" y="306" text-anchor="middle">550</text>
    <text x="453" y="306" text-anchor="middle">600</text>
    <text x="547" y="306" text-anchor="middle">650</text>
    <text x="640" y="306" text-anchor="middle">700</text>
  </g>
  <text x="360" y="324" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454">wavelength (nm)</text>

  <text x="370" y="362" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Four sharp colors from one element — quantization made visible.</text>
</svg>
