<!--
  Three-Level Laser — Pump, Non-Radiative Decay, Stimulated Emission
  Book: Quantum Mechanics — A Companion Guide · Chapter: 10-quantum-mechanics-in-the-modern-world · Figure: 02
-->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Three-Level Laser — Population Inversion via Pumping Through Level 3</title>
  <desc>Energy-level diagram showing three horizontal levels. Level 1 (ground, heavily populated) at bottom. Level 3 (pump level, broad) at top. Level 2 (metastable upper laser level, narrow) in middle. Orange broad arrow from 1 to 3 (broadband pump). Gray non-radiative decay arrow from 3 to 2 (heat). Vermillion arrow from 2 to 1 (coherent stimulated emission, the lasing transition). Population labels N₁, N₂, N₃ with inversion annotation N₂ > N₁.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="10-quantum-mechanics-in-the-modern-world" figure-number="02" figure-title="Three Level Laser" figure-slug="three-level-laser" figure-type="conceptual" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/10-quantum-mechanics-in-the-modern-world-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Three-Level Laser — Maiman 1960 Ruby, and Every Laser Since</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Pump to level 3 (broadband); fast decay to metastable level 2; stimulated emission from 2 to 1 produces coherent light.</text>

  <!-- Levels — y-coordinates: level 3 high (y=120), level 2 middle (y=220), level 1 ground (y=340) -->
  <line x1="200" y1="120" x2="450" y2="120" stroke="#2a1a0e" stroke-width="2.5"/>
  <text x="200" y="116" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">level 3 (pump)</text>
  <text x="455" y="125" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">N₃ small</text>

  <line x1="200" y1="220" x2="450" y2="220" stroke="#2a1a0e" stroke-width="2.5"/>
  <text x="200" y="216" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">level 2 (metastable)</text>
  <text x="455" y="225" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">N₂ → N₂ &gt; N₁ inversion</text>

  <line x1="200" y1="340" x2="450" y2="340" stroke="#2a1a0e" stroke-width="3"/>
  <text x="200" y="336" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">level 1 (ground)</text>
  <text x="455" y="345" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">N₁ large initially</text>

  <!-- Pump arrow (orange, broad) from level 1 to level 3 -->
  <line x1="240" y1="340" x2="240" y2="125" stroke="#E69F00" stroke-width="5"/>
  <polygon points="240,125 235,135 245,135" fill="#E69F00"/>
  <text x="220" y="234" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#C8860E">pump</text>
  <text x="220" y="250" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8860E">broadband</text>

  <!-- Non-radiative decay from 3 to 2 (gray, dashed) -->
  <line x1="330" y1="125" x2="330" y2="215" stroke="#545454" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="330,215 325,205 335,205" fill="#545454"/>
  <text x="340" y="178" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">non-radiative</text>
  <text x="340" y="190" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">decay (heat)</text>

  <!-- Stimulated emission 2 → 1 (vermillion, coherent) -->
  <line x1="410" y1="225" x2="410" y2="335" stroke="#D55E00" stroke-width="3.5"/>
  <polygon points="410,335 405,325 415,325" fill="#D55E00"/>
  <text x="420" y="284" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">stimulated</text>
  <text x="420" y="298" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">emission</text>
  <text x="420" y="312" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">coherent ν₂₁</text>

  <text x="350" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Einstein 1917 predicted stimulated emission. Forty-three years later it became a coherent beam.</text>
</svg>
