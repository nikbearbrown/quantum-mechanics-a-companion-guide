<!--
  Bell State Generation Circuit — Hadamard + CNOT
  Book: Quantum Mechanics — A Companion Guide · Chapter: 10-quantum-mechanics-in-the-modern-world · Figure: 04
-->
<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Bell State Generation — Two Gates Make Maximal Entanglement</title>
  <desc>Standard quantum circuit diagram for Bell-state generation. Two qubit wires (top q1, bottom q2). Both start in |0⟩. Hadamard "H" box on q1. CNOT (filled control dot on q1, ⊕ target on q2). Final output (|00⟩ + |11⟩)/√2 (the Φ+ Bell state). Intermediate state (|00⟩ + |10⟩)/√2 labeled between gates.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="10-quantum-mechanics-in-the-modern-world" figure-number="04" figure-title="Bell State Circuit" figure-slug="bell-state-circuit" figure-type="conceptual" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/10-quantum-mechanics-in-the-modern-world-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="380" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Bell State Φ⁺ = (|00⟩ + |11⟩)/√2 — Hadamard then CNOT</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Maximal entanglement requires only two gates. The cornerstone of every CHSH experiment.</text>

  <!-- Wires -->
  <line x1="100" y1="160" x2="620" y2="160" stroke="#000000" stroke-width="1.2"/>
  <line x1="100" y1="240" x2="620" y2="240" stroke="#000000" stroke-width="1.2"/>

  <!-- Wire labels -->
  <text x="92" y="164" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">|0⟩</text>
  <text x="92" y="244" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">|0⟩</text>
  <text x="62" y="164" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">q₁</text>
  <text x="62" y="244" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">q₂</text>

  <!-- Hadamard gate on q1 at x=230 -->
  <rect x="210" y="135" width="40" height="50" fill="#56B4E9" stroke="#000" stroke-width="1.5"/>
  <text x="230" y="167" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#000000">H</text>

  <!-- Intermediate state annotation -->
  <text x="320" y="92" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#0072B2">(|00⟩ + |10⟩)/√2</text>
  <line x1="320" y1="100" x2="320" y2="135" stroke="#0072B2" stroke-width="0.6" stroke-dasharray="3 2"/>

  <!-- CNOT at x=400 — control dot on q1, target on q2 -->
  <circle cx="400" cy="160" r="6" fill="#000000"/>
  <line x1="400" y1="160" x2="400" y2="240" stroke="#000000" stroke-width="1.5"/>
  <circle cx="400" cy="240" r="14" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <line x1="386" y1="240" x2="414" y2="240" stroke="#000000" stroke-width="1.5"/>
  <line x1="400" y1="226" x2="400" y2="254" stroke="#000000" stroke-width="1.5"/>

  <!-- Output Bell state -->
  <rect x="540" y="160" width="80" height="80" fill="none" stroke="#D55E00" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="580" y="186" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">|Φ⁺⟩ = </text>
  <text x="580" y="208" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">(|00⟩ + |11⟩)/√2</text>
  <text x="580" y="226" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">Bell state</text>

  <!-- Gate labels -->
  <text x="230" y="208" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">Hadamard</text>
  <text x="400" y="280" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">CNOT</text>

  <text x="350" y="350" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Hadamard makes a superposition. CNOT entangles it. Two gates, one Bell state.</text>
</svg>
