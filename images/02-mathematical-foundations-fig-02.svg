<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Complex Plane — z = re^iθ with Conjugate z* Mirrored</title>
  <desc>Cartesian (Re, Im) plane. A point z in the upper-right quadrant marked as a blue dot. Modulus line from origin to z (Blue). Dashed projections show real part (a) and imaginary part (b). Angle θ arc near origin. Conjugate z* (vermillion) mirrored across the real axis.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="02-mathematical-foundations" figure-number="02" figure-title="Complex Plane" figure-slug="complex-plane" figure-type="conceptual" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/02-mathematical-foundations-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Complex Plane — z = a + bi = r e^iθ</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Real axis horizontal, imaginary axis vertical. Quantum amplitudes live here.</text>

  <!-- Axes through (350, 220) -->
  <line x1="120" y1="220" x2="620" y2="220" stroke="#2a1a0e" stroke-width="1.5"/>
  <polygon points="620,220 612,216 612,224" fill="#2a1a0e"/>
  <text x="630" y="224" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">Re</text>

  <line x1="350" y1="380" x2="350" y2="80" stroke="#2a1a0e" stroke-width="1.5"/>
  <polygon points="350,80 346,90 354,90" fill="#2a1a0e"/>
  <text x="346" y="76" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">Im</text>

  <!-- Origin -->
  <circle cx="350" cy="220" r="3" fill="#2a1a0e"/>

  <!-- Point z in upper right -->
  <circle cx="500" cy="130" r="6" fill="#0072B2"/>
  <text x="510" y="124" font-family="'JetBrains Mono', monospace" font-size="12" fill="#0072B2">z = re<tspan baseline-shift="super" font-size="8">iθ</tspan></text>

  <!-- Modulus line origin to z -->
  <line x1="350" y1="220" x2="500" y2="130" stroke="#0072B2" stroke-width="2"/>
  <text x="410" y="160" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">r</text>

  <!-- Projection lines -->
  <line x1="500" y1="220" x2="500" y2="130" stroke="#2a1a0e" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="350" y1="130" x2="500" y2="130" stroke="#2a1a0e" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Real part 'a' label -->
  <text x="425" y="212" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">a (real)</text>
  <text x="340" y="180" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">b (imag)</text>

  <!-- Angle arc -->
  <path d="M 390 220 A 40 40 0 0 0 384 199" stroke="#2a1a0e" stroke-width="1" fill="none"/>
  <text x="392" y="208" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">θ</text>

  <!-- Conjugate z* mirrored -->
  <circle cx="500" cy="310" r="6" fill="#D55E00"/>
  <text x="510" y="316" font-family="'JetBrains Mono', monospace" font-size="12" fill="#D55E00">z* = re<tspan baseline-shift="super" font-size="8">−iθ</tspan></text>
  <line x1="350" y1="220" x2="500" y2="310" stroke="#D55E00" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Bottom equation summary -->
  <rect x="40" y="372" width="620" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.5"/>
  <text x="60" y="394" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">z = a + bi</text>
  <text x="200" y="394" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">|z|<tspan baseline-shift="super" font-size="7">2</tspan> = z·z* = a<tspan baseline-shift="super" font-size="7">2</tspan> + b<tspan baseline-shift="super" font-size="7">2</tspan> = r<tspan baseline-shift="super" font-size="7">2</tspan></text>
  <text x="440" y="394" font-family="'JetBrains Mono', monospace" font-size="11" fill="#D55E00">z* = a − bi</text>
