<!--
  Harmonic Oscillator — Eigenfunctions on Energy Levels
  Book: Quantum Mechanics — A Companion Guide · Chapter: 04-one-dimensional-problems · Figure: 03
-->
<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Harmonic Oscillator — First Four ψ_n on Parabolic Potential</title>
  <desc>Parabolic potential V(x) = ½ m ω² x² drawn in black. Four horizontal energy-level lines at E_n = ℏω(n + ½) for n=0, 1, 2, 3, each spanning between the classical turning points. Wave functions ψ_n drawn in blue with their baselines at the energy line: n=0 Gaussian bump, n=1 antisymmetric one-node, n=2 two-node symmetric, n=3 three-node antisymmetric.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="04-one-dimensional-problems" figure-number="03" figure-title="Harmonic Oscillator Eigenfunctions" figure-slug="harmonic-oscillator-eigenfunctions" figure-type="conceptual" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/04-one-dimensional-problems-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Simple Harmonic Oscillator — Equally Spaced Levels, Hermite-Gaussian States</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Each level E_n = ℏω(n + ½) — including a non-zero ground state at ½ℏω. Wave functions sit at their energy lines.</text>

  <!-- Parabolic potential — vertex at (370, 400), opening upward through (100, 100) and (640, 100) -->
  <path d="M 100 100 Q 370 700 640 100" stroke="#000000" stroke-width="1.5" fill="none"/>

  <!-- Axes -->
  <line x1="100" y1="420" x2="660" y2="420" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="370" y1="80" x2="370" y2="420" stroke="#2a1a0e" stroke-width="0.6"/>
  <text x="668" y="424" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">x</text>
  <text x="377" y="78" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">E</text>

  <!-- n=0 energy level: at y=350; turning points where parabola crosses (narrow band) -->
  <line x1="260" y1="350" x2="480" y2="350" stroke="#2a1a0e" stroke-width="0.8"/>
  <text x="288" y="354" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#2a1a0e">½ℏω</text>
  <!-- ψ₀ Gaussian centered, on this baseline -->
  <path d="M 260 350 Q 370 280 480 350" stroke="#0072B2" stroke-width="1.8" fill="none"/>

  <!-- n=1 at y=290 -->
  <line x1="207" y1="290" x2="533" y2="290" stroke="#2a1a0e" stroke-width="0.8"/>
  <text x="270" y="294" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#2a1a0e">3/2 ℏω</text>
  <path d="M 207 290 Q 290 230 370 290 Q 450 350 533 290" stroke="#0072B2" stroke-width="1.8" fill="none"/>

  <!-- n=2 at y=230 -->
  <line x1="167" y1="230" x2="573" y2="230" stroke="#2a1a0e" stroke-width="0.8"/>
  <text x="245" y="234" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#2a1a0e">5/2 ℏω</text>
  <path d="M 167 230 Q 235 170 300 230 Q 370 290 440 230 Q 505 170 573 230" stroke="#0072B2" stroke-width="1.8" fill="none"/>

  <!-- n=3 at y=170 -->
  <line x1="134" y1="170" x2="606" y2="170" stroke="#2a1a0e" stroke-width="0.8"/>
  <text x="218" y="174" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#2a1a0e">7/2 ℏω</text>
  <path d="M 134 170 Q 193 110 252 170 Q 311 230 370 170 Q 429 110 488 170 Q 547 230 606 170" stroke="#0072B2" stroke-width="1.8" fill="none"/>

  <text x="370" y="448" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Ground state never sits at zero. Zero-point motion is the price of confinement.</text>
</svg>
