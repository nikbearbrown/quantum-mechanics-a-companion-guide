<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Hydrogen n=2 Linear Stark Effect — Four-Fold Level Splits Into Three</title>
  <desc>Two-column energy-level diagram. Left column: single line "n=2 (4-fold degenerate)" at center energy. Right column: three lines split by external electric field — top at +3eℰa₀ labeled (|2s⟩ − |2p_z⟩)/√2; middle at 0 with degeneracy 2 labeled |2p_x⟩, |2p_y⟩; bottom at −3eℰa₀ labeled (|2s⟩ + |2p_z⟩)/√2. Connecting lines show state mixing.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="09-approximation-methods" figure-number="02" figure-title="Hydrogen Stark Effect" figure-slug="hydrogen-stark-effect" figure-type="quantitative" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/09-approximation-methods-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Linear Stark Effect — Hydrogen n=2 in External Electric Field</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">2s and 2p<tspan baseline-shift="sub" font-size="7">z</tspan> mix into "good" zeroth-order states. 2p<tspan baseline-shift="sub" font-size="7">x</tspan> and 2p<tspan baseline-shift="sub" font-size="7">y</tspan> remain degenerate at the unperturbed energy.</text>

  <!-- Column headers -->
  <text x="180" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">ℰ = 0   (4-fold degenerate)</text>
  <text x="540" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">ℰ ≠ 0   (split into 3 levels)</text>

  <!-- Reference dashed horizontal at center energy -->
  <line x1="100" y1="240" x2="660" y2="240" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="92" y="244" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#aaa">E<tspan baseline-shift="sub" font-size="7">n=2</tspan></text>

  <!-- Left column: single line at y=240 -->
  <line x1="120" y1="240" x2="260" y2="240" stroke="#545454" stroke-width="4"/>
  <text x="190" y="220" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">|2s⟩, |2p<tspan baseline-shift="sub" font-size="7">x</tspan>⟩, |2p<tspan baseline-shift="sub" font-size="7">y</tspan>⟩, |2p<tspan baseline-shift="sub" font-size="7">z</tspan>⟩</text>

  <!-- Right column: three levels -->
  <!-- top: +3eℰa₀ at y=140 -->
  <line x1="430" y1="140" x2="600" y2="140" stroke="#D55E00" stroke-width="3.5"/>
  <text x="515" y="125" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">+3eℰa₀</text>
  <text x="515" y="160" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">(|2s⟩ − |2p<tspan baseline-shift="sub" font-size="7">z</tspan>⟩)/√2</text>

  <!-- middle: 0 at y=240, double-degenerate -->
  <line x1="430" y1="237" x2="600" y2="237" stroke="#0072B2" stroke-width="3"/>
  <line x1="430" y1="243" x2="600" y2="243" stroke="#0072B2" stroke-width="3"/>
  <text x="610" y="241" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">deg 2</text>
  <text x="515" y="262" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">|2p<tspan baseline-shift="sub" font-size="7">x</tspan>⟩, |2p<tspan baseline-shift="sub" font-size="7">y</tspan>⟩</text>

  <!-- bottom: -3eℰa₀ at y=340 -->
  <line x1="430" y1="340" x2="600" y2="340" stroke="#009E73" stroke-width="3.5"/>
  <text x="515" y="358" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#009E73">−3eℰa₀</text>
  <text x="515" y="372" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#009E73">(|2s⟩ + |2p<tspan baseline-shift="sub" font-size="7">z</tspan>⟩)/√2</text>

  <!-- Connecting lines from left to right -->
  <line x1="260" y1="240" x2="430" y2="140" stroke="#D55E00" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="260" y1="240" x2="430" y2="240" stroke="#0072B2" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="260" y1="240" x2="430" y2="340" stroke="#009E73" stroke-width="0.8" stroke-dasharray="2 2"/>

  <text x="370" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Degenerate perturbation theory: diagonalize the perturbation in the degenerate subspace.</text>
</svg>
