<svg viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-am d-am">
  <title id="t-am">Angular momentum quantization: vector cone model</title>
  <desc id="d-am">The vector cone model for orbital angular momentum with l equals 2. The total angular momentum vector has fixed length the square root of l times l plus one times h-bar, but its z-component is quantized to m times h-bar for m equal to minus 2, minus 1, 0, plus 1, plus 2. Each allowed m traces a cone about the z-axis. The m equals plus 2 cone is emphasized.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM COMPANION GUIDE</provenance></metadata>
  <rect x="0" y="0" width="560" height="420" fill="#FFFFFF"/>
  <text x="280" y="28" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Angular Momentum Quantization (ℓ = 2)</text>

  <rect x="40" y="48" width="480" height="312" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>

  <!-- z axis -->
  <line x1="200" y1="350" x2="200" y2="60" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="210" y="66" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">Lz</text>
  <!-- origin -->
  <circle cx="200" cy="205" r="2.5" fill="#2a1a0e"/>

  <!-- allowed Lz tick levels: m=-2..2 ; spacing = hbar -->
  <!-- y for m: center 205, step 58 -->
  <!-- m=+2 y=89 ; +1 y=147 ; 0 y=205 ; -1 y=263 ; -2 y=321 -->
  <g font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">
    <line x1="195" y1="89" x2="205" y2="89" stroke="#545454" stroke-width="1"/><text x="150" y="93" text-anchor="end">+2ℏ</text>
    <line x1="195" y1="147" x2="205" y2="147" stroke="#545454" stroke-width="1"/><text x="150" y="151" text-anchor="end">+1ℏ</text>
    <line x1="195" y1="205" x2="205" y2="205" stroke="#545454" stroke-width="1"/><text x="150" y="209" text-anchor="end">0</text>
    <line x1="195" y1="263" x2="205" y2="263" stroke="#545454" stroke-width="1"/><text x="150" y="267" text-anchor="end">−1ℏ</text>
    <line x1="195" y1="321" x2="205" y2="321" stroke="#545454" stroke-width="1"/><text x="150" y="325" text-anchor="end">−2ℏ</text>
  </g>

  <!-- vector length |L| = sqrt(6) hbar ~ 2.449 hbar -> radius in px: hbar=58px -> 142px -->
  <!-- vectors from origin to each m, length 142. dz = 205 - y. horizontal = sqrt(142^2 - dz^2) -->
  <!-- m=+2: dz=116, horiz=sqrt(142^2-116^2)=sqrt(20164-13456)=sqrt(6708)=81.9 -> tip (281.9, 89) RED -->
  <line x1="200" y1="205" x2="282" y2="89" stroke="#2a1a0e" stroke-width="2.5"/>
  <ellipse cx="200" cy="89" rx="82" ry="14" fill="none" stroke="#2a1a0e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="300" y="86" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">m = +2 cone</text>

  <!-- m=+1: dz=58, horiz=sqrt(20164-3364)=sqrt(16800)=129.6 -> tip 329.6,147 -->
  <line x1="200" y1="205" x2="330" y2="147" stroke="#2a1a0e" stroke-width="1.5"/>
  <ellipse cx="200" cy="147" rx="130" ry="20" fill="none" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- m=0: dz=0 horiz=142 -> tip 342,205 -->
  <line x1="200" y1="205" x2="342" y2="205" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- m=-1: tip 329.6,263 -->
  <line x1="200" y1="205" x2="330" y2="263" stroke="#2a1a0e" stroke-width="1.5"/>
  <ellipse cx="200" cy="263" rx="130" ry="20" fill="none" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- m=-2: tip 282,321 -->
  <line x1="200" y1="205" x2="282" y2="321" stroke="#2a1a0e" stroke-width="1.5"/>
  <ellipse cx="200" cy="321" rx="82" ry="14" fill="none" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="370" y="205" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|L| = √(ℓ(ℓ+1)) ℏ</text>

  <text x="40" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454"><tspan x="40" dy="0">|L|² = ℓ(ℓ+1)ℏ² is fixed; Lz = mℏ is quantized; the vector never</tspan><tspan x="40" dy="15">aligns fully with z (m max = ℓ &lt; √(ℓ(ℓ+1))).</tspan></text>
  
</svg>
