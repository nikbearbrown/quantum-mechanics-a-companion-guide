<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-ip d-ip">
  <title id="t-ip">Identical particles: symmetric bosons versus antisymmetric fermions</title>
  <desc id="d-ip">Two identical particles distributed over single-particle states. Bosons have a symmetric total wavefunction and may occupy the same state, so multiple bosons pile into the ground level. Fermions have an antisymmetric wavefunction that vanishes when two share a state — the Pauli exclusion principle — so they fill levels one per state. The forbidden double-occupancy for fermions is marked.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM COMPANION GUIDE</provenance></metadata>
  <rect x="0" y="0" width="640" height="400" fill="#FFFFFF"/>
  <text x="320" y="28" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Identical Particles: Bosons vs. Fermions</text>

  <!-- LEFT: Bosons (symmetric) -->
  <rect x="40" y="55" width="250" height="250" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="165" y="77" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">BOSONS — symmetric</text>
  <!-- levels -->
  <g stroke="#2a1a0e" stroke-width="1.5">
    <line x1="80" y1="270" x2="250" y2="270"/>
    <line x1="80" y1="220" x2="250" y2="220"/>
    <line x1="80" y1="170" x2="250" y2="170"/>
    <line x1="80" y1="120" x2="250" y2="120"/>
  </g>
  <!-- both bosons in ground level -->
  <circle cx="150" cy="262" r="7" fill="#787878"/>
  <circle cx="180" cy="262" r="7" fill="#787878"/>
  <text x="165" y="296" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">may share a state</text>

  <!-- RIGHT: Fermions (antisymmetric) -->
  <rect x="350" y="55" width="250" height="250" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="475" y="77" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">FERMIONS — antisymmetric</text>
  <g stroke="#2a1a0e" stroke-width="1.5">
    <line x1="390" y1="270" x2="560" y2="270"/>
    <line x1="390" y1="220" x2="560" y2="220"/>
    <line x1="390" y1="170" x2="560" y2="170"/>
    <line x1="390" y1="120" x2="560" y2="120"/>
  </g>
  <!-- one per level -->
  <circle cx="475" cy="262" r="7" fill="#787878"/>
  <circle cx="475" cy="212" r="7" fill="#787878"/>
  <!-- forbidden second particle on ground, RED -->
  <circle cx="505" cy="262" r="7" fill="none" stroke="#2a1a0e" stroke-width="2" stroke-dasharray="3 2"/>
  <line x1="498" y1="255" x2="512" y2="269" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="512" y1="255" x2="498" y2="269" stroke="#2a1a0e" stroke-width="2"/>
  <text x="475" y="296" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Pauli exclusion: no two alike</text>

  <text x="40" y="340" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">ψ(1,2) = +ψ(2,1)  (bosons)        ψ(1,2) = −ψ(2,1)  (fermions)</text>
  <text x="40" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Antisymmetry forces ψ → 0 when two fermions share a state; bosons, being symmetric, condense into one.</text>
  
</svg>
