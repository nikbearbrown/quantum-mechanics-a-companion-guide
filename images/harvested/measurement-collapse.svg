<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-mc d-mc">
  <title id="t-mc">Superposition and measurement collapse</title>
  <desc id="d-mc">Before measurement, a state is a superposition with probability amplitudes over several eigenstates, drawn as a bar chart of probabilities summing to one. A measurement arrow leads to the collapsed state, where the system is found in a single eigenstate with probability one. The outcome that is realized is highlighted in red.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM COMPANION GUIDE</provenance></metadata>
  <defs><marker id="ar-mc" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#2a1a0e"/></marker></defs>
  <rect x="0" y="0" width="640" height="380" fill="#FFFFFF"/>
  <text x="320" y="28" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Superposition &amp; Measurement Collapse</text>

  <!-- BEFORE -->
  <rect x="40" y="55" width="240" height="240" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="160" y="76" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">BEFORE — superposition</text>
  <text x="160" y="96" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|ψ⟩ = Σ cₙ|n⟩</text>
  <!-- baseline -->
  <line x1="60" y1="270" x2="265" y2="270" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- prob bars (all grey), heights sum to 1 -->
  <!-- bar widths 28, gap 10, start x=70 -->
  <rect x="70" y="200" width="28" height="70" fill="#787878"/>
  <rect x="108" y="160" width="28" height="110" fill="#787878"/>
  <rect x="146" y="220" width="28" height="50" fill="#787878"/>
  <rect x="184" y="185" width="28" height="85" fill="#787878"/>
  <rect x="222" y="235" width="28" height="35" fill="#787878"/>
  <g font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454" text-anchor="middle">
    <text x="84" y="284">1</text><text x="122" y="284">2</text><text x="160" y="284">3</text><text x="198" y="284">4</text><text x="236" y="284">5</text>
  </g>
  <text x="48" y="160" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454" transform="rotate(-90 48 160)">|cₙ|²</text>

  <!-- arrow -->
  <line x1="290" y1="180" x2="360" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ar-mc)"/>
  <text x="325" y="170" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">measure</text>
  <text x="325" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">P=|c₂|²</text>

  <!-- AFTER -->
  <rect x="370" y="55" width="240" height="240" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="490" y="76" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">AFTER — collapsed</text>
  <text x="490" y="96" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|ψ⟩ → |2⟩</text>
  <line x1="390" y1="270" x2="595" y2="270" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- single bar at outcome 2, full height, RED -->
  <rect x="438" y="120" width="28" height="150" fill="#C8102E"/>
  <g font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454" text-anchor="middle">
    <text x="414" y="284">1</text><text x="452" y="284">2</text><text x="490" y="284">3</text><text x="528" y="284">4</text><text x="566" y="284">5</text>
  </g>
  <text x="452" y="112" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#C8102E">P=1</text>

  <text x="40" y="326" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454"><tspan x="40" dy="0">Measurement returns one eigenvalue with probability |cₙ|²; the state then</tspan><tspan x="40" dy="15">collapses to that eigenstate. Repeated measurement gives the same result.</tspan></text>
  
</svg>
