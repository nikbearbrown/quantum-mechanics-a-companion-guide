<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-up d-up">
  <title id="t-up">Heisenberg uncertainty: position-momentum tradeoff</title>
  <desc id="d-up">Two paired panels. On the left a narrow position distribution (small sigma-x) pairs with a broad momentum distribution (large sigma-p). On the right a broad position distribution pairs with a narrow momentum distribution. Narrowing one widens the other; their product is bounded below by h-bar over two. The Robertson bound is highlighted in red.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM COMPANION GUIDE</provenance></metadata>
  <rect x="0" y="0" width="640" height="400" fill="#FFFFFF"/>
  <text x="320" y="28" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Heisenberg Uncertainty: Position–Momentum Tradeoff</text>

  <!-- LEFT pair: narrow x, broad p -->
  <!-- x panel -->
  <rect x="40" y="55" width="250" height="120" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="40" y1="165" x2="290" y2="165" stroke="#2a1a0e" stroke-width="1.5"/>
  <path d="M120 165 C 150 165 155 70 165 70 C 175 70 180 165 210 165 Z" fill="#787878" fill-opacity="0.30" stroke="#2a1a0e" stroke-width="2"/>
  <text x="165" y="48" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">small σₓ</text>
  <text x="280" y="160" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">x</text>
  <!-- p panel -->
  <rect x="40" y="195" width="250" height="120" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="40" y1="305" x2="290" y2="305" stroke="#2a1a0e" stroke-width="1.5"/>
  <path d="M60 305 C 110 305 120 240 165 240 C 210 240 220 305 270 305 Z" fill="#787878" fill-opacity="0.30" stroke="#2a1a0e" stroke-width="2"/>
  <text x="165" y="333" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">large σₚ</text>
  <text x="280" y="300" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">p</text>

  <!-- RIGHT pair: broad x, narrow p -->
  <rect x="350" y="55" width="250" height="120" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="350" y1="165" x2="600" y2="165" stroke="#2a1a0e" stroke-width="1.5"/>
  <path d="M370 165 C 420 165 430 100 475 100 C 520 100 530 165 580 165 Z" fill="#787878" fill-opacity="0.30" stroke="#2a1a0e" stroke-width="2"/>
  <text x="475" y="48" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">large σₓ</text>
  <text x="590" y="160" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">x</text>
  <rect x="350" y="195" width="250" height="120" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="350" y1="305" x2="600" y2="305" stroke="#2a1a0e" stroke-width="1.5"/>
  <path d="M430 305 C 460 305 465 215 475 215 C 485 215 490 305 520 305 Z" fill="#787878" fill-opacity="0.30" stroke="#2a1a0e" stroke-width="2"/>
  <text x="475" y="333" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">small σₚ</text>
  <text x="590" y="300" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">p</text>

  <!-- bound, RED -->
  <text x="320" y="365" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="16" fill="#C8102E">σₓ · σₚ ≥ ℏ/2</text>
  <text x="320" y="382" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454"><tspan x="320" dy="0">Sharpening one distribution necessarily broadens the other —</tspan><tspan x="320" dy="14">a property of the state, not of the measuring device.</tspan></text>
  
</svg>
