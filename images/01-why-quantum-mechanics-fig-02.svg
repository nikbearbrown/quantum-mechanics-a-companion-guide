<!--
  Photoelectric — Stopping Potential vs Frequency
  Book: Quantum Mechanics — A Companion Guide · Chapter: 01-why-quantum-mechanics · Figure: 02
-->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Photoelectric Effect — Linear in Frequency, Threshold ν₀, Slope h/e</title>
  <desc>Stopping potential V_s vs incident frequency ν. Below threshold ν₀, no photoemission regardless of intensity. Above ν₀, V_s rises linearly with slope h/e. Einstein's 1905 explanation: light comes in quanta E = hν.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="01-why-quantum-mechanics" figure-number="02" figure-title="Photoelectric Stopping" figure-slug="photoelectric-stopping" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/01-why-quantum-mechanics-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Photoelectric Effect — Einstein 1905: Light Is Quanta</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Below ν₀: no electrons, any intensity. Above ν₀: K_max = hν − φ. Frequency rules, not brightness.</text>

  <line x1="100" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <text x="60" y="220" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454" transform="rotate(-90 60 220)">stopping potential V_s</text>
  <text x="370" y="360" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454">frequency ν</text>

  <!-- Below threshold region: shaded forbidden zone -->
  <rect x="100" y="100" width="180" height="240" fill="#D55E00" opacity="0.08"/>
  <text x="190" y="312" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">no photoemission</text>

  <!-- Threshold marker ν₀ at x=280 -->
  <line x1="280" y1="340" x2="280" y2="320" stroke="#E69F00" stroke-width="2"/>
  <circle cx="280" cy="340" r="6" fill="#E69F00"/>
  <text x="280" y="368" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#C8860E">ν₀</text>

  <!-- Line: dashed below threshold (extension), solid above with slope h/e -->
  <line x1="160" y1="418" x2="280" y2="340" stroke="#0072B2" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="280" y1="340" x2="620" y2="120" stroke="#0072B2" stroke-width="2.5"/>

  <!-- Bracket below x-axis for forbidden region -->
  <path d="M 110 360 L 110 372 L 270 372 L 270 360" stroke="#D55E00" stroke-width="1" stroke-dasharray="3 2" fill="none"/>

  <!-- Slope annotation -->
  <text x="500" y="180" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">slope = h / e</text>

  <!-- Formula -->
  <rect x="320" y="120" width="260" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.5"/>
  <text x="450" y="142" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">K_max = h ν − φ = e V_s</text>

  <text x="370" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Linear, not proportional. The intercept on the frequency axis was the smoking gun.</text>
</svg>
