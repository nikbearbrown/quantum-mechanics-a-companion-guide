  <text x="423.6" y="128" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#009E73">Aspect 1982:</text>
  <text x="423.6" y="116" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#009E73">|S| = 2.697 ± 0.015</text>

  <!-- Note -->
  <text x="350" y="320" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">2015: three independent loophole-free experiments (Delft, NIST, Vienna) confirmed quantum violation</text>
