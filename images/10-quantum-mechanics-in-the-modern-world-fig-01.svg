  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">
    <line x1="100" y1="232" x2="100" y2="250" stroke="#2a1a0e" stroke-width="1.5"/>
    <text x="100" y="266" text-anchor="middle">0</text>

    <line x1="340" y1="232" x2="340" y2="250" stroke="#2a1a0e" stroke-width="1.5"/>
