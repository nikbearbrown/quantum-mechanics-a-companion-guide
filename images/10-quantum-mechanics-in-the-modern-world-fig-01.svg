  <rect x="340" y="150" width="100" height="60" fill="#D55E00" fill-opacity="0.45" stroke="#000" stroke-width="0.6"/>
  <rect x="440" y="150" width="140" height="60" fill="#bbbbbb" fill-opacity="0.45" stroke="#000" stroke-width="0.6"/>

  <!-- Region labels (centered in bands) -->
  <text x="220" y="184" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">local hidden variables</text>
  <text x="390" y="184" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#D55E00">quantum</text>
  <text x="510" y="184" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#545454">PR no-signaling</text>

