<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">CHSH Bound — 2 (LHV), 2√2 (Tsirelson), 4 (Algebraic Max)</title>
  <desc>Horizontal number line showing the three regions of the CHSH parameter |S|. Sky-blue band 0–2 = local hidden variables. Vermillion band 2–2√2 ≈ 2.828 = quantum mechanics (singlet, optimal axes). Light gray 2√2–4 = Popescu-Rohrlich no-signaling. Markers at 2, 2.828, 4. Experimental marker at 2.697 (Aspect 1982).</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="10-quantum-mechanics-in-the-modern-world" figure-number="01" figure-title="CHSH Bounds" figure-slug="chsh-bounds" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/10-quantum-mechanics-in-the-modern-world-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="380" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">CHSH Inequality — Bell, Quantum, and Beyond</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Local hidden variables can do no better than 2. Quantum mechanics achieves 2√2 ≈ 2.828. No-signaling allows up to 4.</text>

  <!-- Bands -->
  <!-- 0 to 4 mapping: x = 100 + (value/4) * 480 -->
  <!-- 0=100, 2=340, 2√2=339.4, 4=580 -->
  <!-- 0=100, 2=340, 2.828=440, 4=580 -->
