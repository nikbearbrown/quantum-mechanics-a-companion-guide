<!--
  Algorithm Scaling — Shor vs Grover vs Classical
  Book: Quantum Mechanics — A Companion Guide · Chapter: 10-quantum-mechanics-in-the-modern-world · Figure: 05
-->
<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Quantum Speedup — Shor (Exponential) vs Grover (Quadratic) vs Classical</title>
  <desc>Log-log plot of runtime vs problem size. Four curves: classical GNFS factoring (vermillion, steeply rising); Shor's algorithm (bluish-green, shallow polynomial); classical brute force search (vermillion, linear); Grover (bluish-green, square root). Shor's gap with classical widens dramatically. Grover's gap is constant on log scale (quadratic = factor 2 shift).</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="10-quantum-mechanics-in-the-modern-world" figure-number="05" figure-title="Quantum Algorithm Scaling" figure-slug="quantum-algorithm-scaling" figure-type="quantitative" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/10-quantum-mechanics-in-the-modern-world-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Algorithm Runtime vs Problem Size — Not All Quantum Speedups Are Equal</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Shor: gap with classical widens exponentially with n. Grover: gap is constant on log scale.</text>

  <!-- Two panels: factoring on left, search on right -->
  <line x1="370" y1="100" x2="370" y2="400" stroke="#aaa" stroke-width="0.5"/>

  <!-- ===== Left panel: Factoring ===== -->
  <text x="200" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">factoring N-bit integer</text>

  <line x1="80" y1="380" x2="350" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="80" y1="130" x2="80" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <text x="350" y="396" text-anchor="end" font-family="'Inter', sans-serif" font-size="9" fill="#545454">n (bits)</text>
  <text x="60" y="240" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#545454" transform="rotate(-90 60 240)">log runtime</text>

  <!-- Classical GNFS — steep curve -->
  <path d="M 100 360 C 150 340 200 280 250 220 C 280 175 320 145 340 130" stroke="#D55E00" stroke-width="2.4" fill="none"/>
  <text x="280" y="170" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">classical GNFS</text>
  <text x="280" y="183" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">≈ exp(n^(1/3))</text>

  <!-- Shor — shallow polynomial -->
  <path d="M 100 370 C 150 365 200 355 250 345 C 300 335 340 320 340 318" stroke="#009E73" stroke-width="2.4" fill="none"/>
  <text x="270" y="358" font-family="'JetBrains Mono', monospace" font-size="9" fill="#009E73">Shor: O(n³) polynomial</text>

  <!-- Gap arrow -->
  <line x1="320" y1="320" x2="320" y2="155" stroke="#C8860E" stroke-width="1.2"/>
  <polygon points="320,155 316,165 324,165" fill="#C8860E"/>
  <polygon points="320,320 316,310 324,310" fill="#C8860E"/>
  <text x="324" y="240" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8860E">exponential gap</text>

  <!-- ===== Right panel: Search ===== -->
  <text x="520" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">unstructured search of N items</text>

  <line x1="400" y1="380" x2="660" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="400" y1="130" x2="400" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <text x="660" y="396" text-anchor="end" font-family="'Inter', sans-serif" font-size="9" fill="#545454">log N</text>

  <!-- Classical brute force — linear on log scale -->
  <line x1="420" y1="370" x2="640" y2="160" stroke="#D55E00" stroke-width="2.4"/>
  <text x="500" y="200" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">classical O(N)</text>

  <!-- Grover sqrt N — half slope -->
  <line x1="420" y1="370" x2="640" y2="265" stroke="#009E73" stroke-width="2.4"/>
  <text x="500" y="298" font-family="'JetBrains Mono', monospace" font-size="9" fill="#009E73">Grover O(√N)</text>

  <!-- Constant gap -->
  <line x1="620" y1="265" x2="620" y2="170" stroke="#C8860E" stroke-width="1.2"/>
  <text x="625" y="220" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8860E">factor 2</text>
  <text x="625" y="233" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8860E">quadratic</text>

  <text x="370" y="442" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Shor breaks RSA. Grover halves search time. The rare exponential speedup is the special prize.</text>
</svg>
