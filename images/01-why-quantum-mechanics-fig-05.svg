<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Franck-Hertz — Periodic Dips at 4.9 V Reveal Discrete Mercury Levels</title>
  <desc>Collector current I vs accelerating voltage V for mercury vapor. Sharp current dips at V = 4.9, 9.8, 14.7 V — each corresponds to an inelastic collision where the electron transfers exactly 4.9 eV to a mercury atom. Direct evidence of energy quantization.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="01-why-quantum-mechanics" figure-number="05" figure-title="Franck-Hertz" figure-slug="franck-hertz" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/01-why-quantum-mechanics-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Franck-Hertz, 1914 — Electrons Find Mercury's First Excited State</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Every 4.9 V the current dips. Each dip is one inelastic collision per electron. Discrete spectrum, mapped.</text>

  <line x1="100" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <text x="60" y="220" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454" transform="rotate(-90 60 220)">collector current I</text>
  <text x="370" y="378" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454">accelerating voltage V (volts)</text>

  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#2a1a0e" text-anchor="middle">
    <text x="100" y="361">0</text>
    <text x="232" y="361">4.9</text>
    <text x="364" y="361">9.8</text>
    <text x="496" y="361">14.7</text>
    <text x="628" y="361">19.6</text>
  </g>

