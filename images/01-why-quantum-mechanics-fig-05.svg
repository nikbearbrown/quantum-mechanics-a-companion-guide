  <line x1="364" y1="100" x2="364" y2="340" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3 2"/>
  <line x1="496" y1="100" x2="496" y2="340" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3 2"/>

