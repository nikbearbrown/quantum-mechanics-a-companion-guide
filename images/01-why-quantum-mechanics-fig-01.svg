<!--
  Rayleigh-Jeans Catastrophe vs Planck Distribution
  Book: Quantum Mechanics — A Companion Guide · Chapter: 01-why-quantum-mechanics · Figure: 01
-->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">UV Catastrophe — Classical Prediction Diverges, Planck Distribution Peaks</title>
  <desc>Spectral energy density vs frequency at fixed T. Rayleigh-Jeans (classical) rises as ν² without bound; Planck distribution rises to a finite peak and falls exponentially. The disagreement at high ν is the ultraviolet catastrophe — solved by quantizing oscillator energies.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="01-why-quantum-mechanics" figure-number="01" figure-title="UV Catastrophe" figure-slug="uv-catastrophe" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/01-why-quantum-mechanics-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">UV Catastrophe — Two Curves That Disagree Spectacularly</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Classical Rayleigh-Jeans diverges. Planck quantizes oscillator energy ε = nhf. Catastrophe averted.</text>

  <line x1="100" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <text x="60" y="220" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454" transform="rotate(-90 60 220)">spectral energy density u(ν, T)</text>
  <text x="370" y="360" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454">frequency ν</text>

  <!-- Rayleigh-Jeans curve: u ∝ ν² rising indefinitely. Truncation arrow at top -->
  <path d="M 100 340 Q 240 300 360 200 Q 420 130 460 100" stroke="#D55E00" stroke-width="2.5" fill="none"/>
  <polygon points="460,100 452,108 468,108" fill="#D55E00"/>
  <text x="470" y="120" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="11" fill="#D55E00">Rayleigh-Jeans → ∞</text>

  <!-- Planck distribution: rises, peaks once at characteristic frequency, exponentially falls -->
  <path d="M 100 340 Q 200 305 270 235 Q 330 175 380 172 Q 430 178 500 245 Q 580 315 660 333" stroke="#0072B2" stroke-width="2.5" fill="none"/>
  <text x="420" y="160" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">Planck</text>

  <!-- Peak reference line (vertical, under the crest at x=380) -->
  <line x1="380" y1="170" x2="380" y2="340" stroke="#2a1a0e" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="392" y="332" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454">peak ν_max</text>

  <!-- Equation box -->
  <rect x="440" y="220" width="220" height="80" fill="#FFFFFF" stroke="#aaa" stroke-width="0.5"/>
  <text x="550" y="240" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">Planck (1900)</text>
  <text x="450" y="262" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">u(ν,T) = (8πhν³/c³)</text>
  <text x="450" y="280" font-family="'JetBrains Mono', monospace" font-size="11" fill="#0072B2">           · 1/(e^(hν/kT) − 1)</text>
  <text x="450" y="296" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">ε = n h ν (quantized)</text>

  <text x="370" y="396" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">"An act of desperation" — Planck on quantizing oscillator energy.</text>
</svg>
