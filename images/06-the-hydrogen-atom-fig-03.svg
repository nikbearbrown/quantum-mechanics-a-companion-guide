<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Hydrogen 1s — Radial Wave Function R₁₀(r) = (2/a₀^(3/2)) e^(−r/a₀)</title>
  <desc>R₁₀(r) plotted as monotonically decreasing exponential from a peak at r=0 down toward zero around r=5a₀. Sky-blue curve; x-axis in units of a₀ from 0 to 5; smooth exponential decay.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="06-the-hydrogen-atom" figure-number="03" figure-title="1s Radial Wave Function" figure-slug="1s-radial-wave-function" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/06-the-hydrogen-atom-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">R₁₀(r) = (2 / a₀^(3/2)) e^(−r / a₀) — 1s Radial Wave Function</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Maximum at r = 0 and monotonically decreasing. Pair with the radial probability density (next figure).</text>

  <!-- Axes -->
  <line x1="100" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
