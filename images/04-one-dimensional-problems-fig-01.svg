<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Infinite Square Well — ψ₁ through ψ₄</title>
  <desc>Four vertically stacked panels showing ψ_n(x) for n=1, 2, 3, 4 over the well interval [0, L]. Each curve has n half-wavelengths between the walls (n−1 interior nodes). Walls at x=0, x=L marked black; dashed horizontal baseline in each panel; vertical dashed lines mark interior nodes.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="04-one-dimensional-problems" figure-number="01" figure-title="Infinite Square Well Eigenfunctions" figure-slug="infinite-well-eigenfunctions" figure-type="conceptual" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/04-one-dimensional-problems-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Standing Waves in a Box — ψ_n(x) = √(2/L) sin(n π x / L)</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Each eigenstate has exactly n half-wavelengths between the walls — n−1 interior nodes where ψ = 0.</text>

