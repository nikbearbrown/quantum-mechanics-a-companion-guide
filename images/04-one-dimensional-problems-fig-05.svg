<!--
  Nuclear Potential and Alpha-Decay Tunneling
  Book: Quantum Mechanics — A Companion Guide · Chapter: 04-one-dimensional-problems · Figure: 05
-->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Alpha-Decay Tunneling — Wave Function Leaks Through the Coulomb Barrier</title>
  <desc>Nuclear potential V(r): deep attractive well from r=0 to r=R, then Coulomb barrier peaking at r=R and decaying as 1/r. Alpha-particle energy level horizontal, crossing barrier. Tunneling region between r=R and outer turning point r₂ shaded vermillion. Wave function: oscillating inside well, exponentially decaying through barrier, oscillating outside.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="04-one-dimensional-problems" figure-number="05" figure-title="Alpha Decay Tunneling" figure-slug="alpha-decay-tunneling" figure-type="application" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/04-one-dimensional-problems-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Alpha Decay — Wave Function Tunnels Through the Coulomb Barrier</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Gamow 1928: half-life ranges from microseconds to billions of years come from exponential sensitivity of barrier penetration.</text>

  <!-- Axes -->
  <line x1="80" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <text x="668" y="344" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">r</text>
  <text x="72" y="78" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">V(r)</text>

  <!-- Tunneling region shaded (between R=180 and r2=380) -->
  <rect x="180" y="80" width="200" height="260" fill="#D55E00" fill-opacity="0.12" stroke="none"/>

  <!-- Nuclear potential: deep well from r=0 to r=R, then Coulomb peak, then 1/r decay -->
  <!-- Well floor at y=290 from x=80 to x=180 -->
  <line x1="80" y1="290" x2="180" y2="290" stroke="#000000" stroke-width="2"/>
  <line x1="180" y1="290" x2="180" y2="120" stroke="#000000" stroke-width="2"/>
  <!-- Coulomb barrier 1/r from peak at (180, 120) decaying past r₂ -->
  <path d="M 180 120 Q 260 160 380 230 Q 500 280 660 320" stroke="#000000" stroke-width="2" fill="none"/>

  <!-- Energy level (alpha particle energy, well below Coulomb peak) -->
  <line x1="80" y1="230" x2="660" y2="230" stroke="#2a1a0e" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="668" y="234" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">E_α</text>

  <!-- Markers -->
  <text x="180" y="358" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#000000">R</text>
  <text x="380" y="358" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#000000">r₂</text>
  <text x="280" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8860E">classically forbidden — quantum tunnel</text>

  <!-- Wave function: oscillating inside well (on E line) -->
  <path d="M 100 230 Q 115 200 130 230 Q 145 260 160 230 Q 170 215 178 230" stroke="#0072B2" stroke-width="2" fill="none"/>
  <!-- Exponentially decaying through barrier -->
  <path d="M 180 230 C 240 230 310 232 380 235" stroke="#0072B2" stroke-width="2" fill="none"/>
  <!-- Oscillating outside, much smaller amplitude -->
  <path d="M 380 235 Q 400 230 420 240 Q 440 230 460 240 Q 480 230 500 240 Q 520 230 540 240 Q 560 230 580 240 Q 600 230 620 240" stroke="#0072B2" stroke-width="2" fill="none"/>

  <text x="370" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">A tiny exponential leak times 10²⁰ wall collisions per second equals decay.</text>
</svg>
