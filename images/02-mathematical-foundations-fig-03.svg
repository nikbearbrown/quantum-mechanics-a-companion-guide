<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Interference Intensity — Periodic cos² Bands Across the Angle</title>
  <desc>Intensity vs angle θ for double-slit: |ψ|² = 2cos²(kd sin θ/2). Five to seven bright maxima at value 2, dark minima at 0. Bright bands marked with orange triangles; dark minima marked with black ticks.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="02-mathematical-foundations" figure-number="03" figure-title="Interference Intensity" figure-slug="interference-intensity" figure-type="quantitative" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/02-mathematical-foundations-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">|ψ|² = 2cos²(kd sin θ / 2) — Bright Where Two Paths Add, Dark Where They Cancel</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Path-length difference d sin θ shifts the relative phase. cos² gives the bright/dark fringe pattern.</text>

  <line x1="100" y1="320" x2="660" y2="320" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="320" stroke="#2a1a0e" stroke-width="1"/>
  <text x="60" y="220" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454" transform="rotate(-90 60 220)">|ψ|²</text>
  <text x="370" y="380" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454">angle θ</text>

  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454" text-anchor="end">
    <text x="94" y="324">0</text>
    <text x="94" y="210">1</text>
    <text x="94" y="100">2</text>
  </g>

  <!-- cos² curve with 7 maxima -->
  <path d="M 100 100 Q 140 320 180 100 Q 220 320 260 100 Q 300 320 340 100 Q 380 320 420 100 Q 460 320 500 100 Q 540 320 580 100 Q 620 320 660 100" stroke="#0072B2" stroke-width="2.5" fill="none"/>

  <!-- Bright-band markers (orange downward triangles above maxima) -->
  <g fill="#E69F00">
    <polygon points="100,92 96,86 104,86"/>
    <polygon points="180,92 176,86 184,86"/>
    <polygon points="260,92 256,86 264,86"/>
    <polygon points="340,92 336,86 344,86"/>
    <polygon points="420,92 416,86 424,86"/>
    <polygon points="500,92 496,86 504,86"/>
    <polygon points="580,92 576,86 584,86"/>
    <polygon points="660,92 656,86 664,86"/>
  </g>

  <!-- Dark-band ticks (black vertical ticks at zeros below x-axis) -->
  <g stroke="#2a1a0e" stroke-width="0.75">
    <line x1="140" y1="320" x2="140" y2="328"/>
    <line x1="220" y1="320" x2="220" y2="328"/>
    <line x1="300" y1="320" x2="300" y2="328"/>
    <line x1="380" y1="320" x2="380" y2="328"/>
    <line x1="460" y1="320" x2="460" y2="328"/>
    <line x1="540" y1="320" x2="540" y2="328"/>
    <line x1="620" y1="320" x2="620" y2="328"/>
  </g>

  <text x="370" y="396" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Same algebra as in optics. Different physics: it's the wave function, not the field.</text>
</svg>
