<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Superconductor T_c Records — Hg 1911 to LaH₁₀ 2019</title>
  <desc>Scatter plot of T_c (K, log scale) versus year (1911 to present). Conventional superconductors as blue circles (Hg, Nb, Nb3Ge). Cuprates as vermillion squares (LBCO, YBCO, HgBaCaCuO). Pressure-stabilized hydrides as orange triangles (H3S, LaH10). Horizontal dashed reference at 77 K (liquid nitrogen boiling point) crossed in 1987.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="10-quantum-mechanics-in-the-modern-world" figure-number="06" figure-title="Superconductor Tc Timeline" figure-slug="superconductor-tc-timeline" figure-type="quantitative" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/10-quantum-mechanics-in-the-modern-world-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Superconductor T<tspan baseline-shift="sub" font-size="7">c</tspan> Records — 1911 to Present</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Mercury at 4.2 K (Onnes 1911) → cuprates above LN₂ (1987) → hydride T<tspan baseline-shift="sub" font-size="7">c</tspan> ~ 250 K under 170 GPa (2019).</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="660" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <text x="380" y="412" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454">year</text>
  <text x="60" y="240" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#545454" transform="rotate(-90 60 240)">T<tspan baseline-shift="sub" font-size="7">c</tspan> (K, log)</text>

  <!-- Y-axis log ticks: 1, 10, 100, 1000 -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454" text-anchor="end">
    <text x="92" y="380">1</text>
    <text x="92" y="290">10</text>
    <text x="92" y="200">100</text>
    <text x="92" y="110">1000</text>
  </g>

  <!-- X-axis year ticks -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="100" y="396">1911</text>
    <text x="240" y="396">1950</text>
    <text x="380" y="396">1980</text>
    <text x="500" y="396">2000</text>
    <text x="620" y="396">2020</text>
  </g>

  <!-- LN2 reference line at T=77K. log(77)/log(1000) * 270 = (1.886/3) * 270 ≈ 170. y = 380 - 170 = 210 -->
  <line x1="100" y1="210" x2="660" y2="210" stroke="#0072B2" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text x="665" y="214" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0072B2">77 K (LN₂)</text>

  <!-- Data points (color/shape by family) -->
  <!-- Mapping year → x: x = 100 + (year-1911)/(2020-1911) * 560 -->
  <!-- T → y: y = 380 - (log10(T)/3) * 270 -->
  <!-- 1911: 4.2 K → x=100, y=380-log10(4.2)/3*270 = 380 - 0.623/3*270 = 380-56 = 324 -->
  <!-- 1930: Nb 9K → x=100 + 19/109 * 560 ≈ 198, y=380 - log10(9)/3*270 = 380 - 86 = 294 -->
  <!-- 1973: Nb3Ge 23K → x=100+62/109*560 ≈ 419, y=380 - log10(23)/3*270 = 380 - 122 = 258 -->
  <!-- 1986: LBCO 35K → x=100+75/109*560 ≈ 485, y=380 - log10(35)/3*270 = 380 - 139 = 241 -->
  <!-- 1987: YBCO 93K → x=100+76/109*560 ≈ 490, y=380 - log10(93)/3*270 = 380 - 177 = 203 -->
  <!-- 1993: HgBaCaCuO 133K → x=100+82/109*560 ≈ 521, y=380 - log10(133)/3*270 = 380 - 191 = 189 -->
  <!-- 2015: H3S 203K → x=100+104/109*560 ≈ 634, y=380 - log10(203)/3*270 = 380 - 207 = 173 -->
  <!-- 2019: LaH10 250K → x=100+108/109*560 ≈ 655, y=380 - log10(250)/3*270 = 380 - 215 = 165 -->

  <!-- Conventional (blue circle) -->
  <g fill="#0072B2">
    <circle cx="100" cy="324" r="5"/>
    <circle cx="198" cy="294" r="5"/>
    <circle cx="419" cy="258" r="5"/>
