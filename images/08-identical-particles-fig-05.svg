<!--
  FD vs BE vs MB Distributions — One Sign Difference, Two Universes
  Book: Quantum Mechanics — A Companion Guide · Chapter: 08-identical-particles · Figure: 05
-->
<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Fermi-Dirac vs Bose-Einstein vs Maxwell-Boltzmann — Occupation ⟨n⟩</title>
  <desc>Plot of ⟨n_i⟩ vs (E_i − μ)/k_BT. Fermi-Dirac (vermillion, 1/(e^x+1)) clamps at 1. Bose-Einstein (bluish green, 1/(e^x−1)) diverges as x→0. Maxwell-Boltzmann (gray, e^(−x)) is the high-T classical limit. Vertical reference at x=0. Annotations: "FD: max occupation 1 (Pauli)"; "BE: diverges (condensation)"; "MB: classical limit, both quantum cases converge to this at high T".</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="08-identical-particles" figure-number="05" figure-title="FD BE MB Distributions" figure-slug="fd-be-mb-distributions" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/08-identical-particles-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">⟨n⟩ = 1 / (e<tspan baseline-shift="super" font-size="7">(E−μ)/kBT</tspan> ± 1)   vs   classical e<tspan baseline-shift="super" font-size="7">−(E−μ)/kBT</tspan></text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">One sign in the denominator. Two different universes at low temperature.</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="660" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="380" y1="100" x2="380" y2="380" stroke="#2a1a0e" stroke-width="0.6"/>
  <text x="668" y="384" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">(E−μ)/k<tspan baseline-shift="sub" font-size="7">B</tspan>T</text>
  <text x="92" y="98" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">⟨n⟩</text>

  <!-- Y-axis tick at 1 -->
  <line x1="96" y1="290" x2="104" y2="290" stroke="#2a1a0e" stroke-width="1"/>
  <text x="92" y="294" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">1</text>
  <line x1="96" y1="200" x2="104" y2="200" stroke="#2a1a0e" stroke-width="1"/>
  <text x="92" y="204" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">2</text>
  <line x1="96" y1="110" x2="104" y2="110" stroke="#2a1a0e" stroke-width="1"/>
  <text x="92" y="114" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">3</text>

  <!-- X-axis -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="170" y="396">−4</text>
    <text x="275" y="396">−2</text>
    <text x="380" y="396">0</text>
    <text x="485" y="396">+2</text>
    <text x="590" y="396">+4</text>
  </g>

  <!-- Reference line at occupancy 1 -->
  <line x1="100" y1="290" x2="660" y2="290" stroke="#aaa" stroke-width="0.4" stroke-dasharray="3 3"/>

  <!-- FD curve (vermillion): 1/(e^x+1) — clamped near 1 at left, sigmoidal to 0 at right -->
  <path d="M 100 290 C 240 290 320 290 380 335 C 440 380 540 380 660 380" stroke="#D55E00" stroke-width="2.4" fill="none"/>

  <!-- BE curve (bluish green): 1/(e^x-1) — diverges as x→0+, undefined for x≤0; we plot only x>0 region (right of vertical axis) -->
  <!-- At x=0.5: 1/(e^0.5 - 1) ≈ 1.54 → y ≈ 290 - 0.54*90 ≈ 241 -->
  <!-- At x=1: 1/(e - 1) ≈ 0.58 → y ≈ 290 + 0.42*90 ≈ 328 -->
  <!-- At x=2: 1/(e^2 -1) ≈ 0.156 -->
  <!-- At x=4: ≈ 0.018 -->
  <path d="M 385 100 C 395 110 405 150 420 220 C 440 280 500 360 660 378" stroke="#009E73" stroke-width="2.4" fill="none"/>

  <!-- MB curve (gray): e^(-x) — at x=-4: 54.6 (off-chart); x=-2: 7.4; x=0: 1; x=2: 0.135; x=4: 0.018 -->
  <!-- Plot from x=-1 to x=4 to keep in chart -->
  <path d="M 290 50 C 320 80 350 150 380 290 C 410 360 480 378 660 380" stroke="#545454" stroke-width="2" fill="none" stroke-dasharray="6 3"/>

  <!-- Annotations / legend -->
  <rect x="450" y="100" width="200" height="78" fill="#FFFFFF" stroke="#aaa" stroke-width="0.5"/>
  <line x1="460" y1="116" x2="490" y2="116" stroke="#D55E00" stroke-width="2.4"/>
  <text x="495" y="120" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">FD (fermions)</text>
  <line x1="460" y1="138" x2="490" y2="138" stroke="#009E73" stroke-width="2.4"/>
  <text x="495" y="142" font-family="'JetBrains Mono', monospace" font-size="10" fill="#009E73">BE (bosons)</text>
  <line x1="460" y1="160" x2="490" y2="160" stroke="#545454" stroke-width="2" stroke-dasharray="5 2"/>
  <text x="495" y="164" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">MB (classical)</text>

  <!-- Punchline annotations -->
  <text x="170" y="320" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">Pauli ceiling: ⟨n⟩ ≤ 1</text>
  <text x="395" y="92" font-family="'JetBrains Mono', monospace" font-size="9" fill="#009E73">BEC divergence as E → μ</text>

  <text x="370" y="440" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">High T: all three converge. Low T: fermions stack, bosons condense.</text>
</svg>
