  <title id="fig-title">Gaussian Wave-Packet Spreading — σ(t) Parabolic Near Zero, Linear at Late Times</title>
  <desc>Plot of σ(t) = σ₀√(1 + (ℏt/2mσ₀²)²) starting at σ₀ at t=0 (flat parabolic minimum marked with orange dot), then smoothly transitioning to linear growth. Dashed vermillion asymptote shows late-time linear regime.</desc>
