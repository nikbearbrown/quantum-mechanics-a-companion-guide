<!--
  Helium 1s2s — Parahelium vs Orthohelium Splitting
  Book: Quantum Mechanics — A Companion Guide · Chapter: 08-identical-particles · Figure: 03
-->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Helium 1s2s — Singlet–Triplet Splitting from Exchange Energy K</title>
  <desc>Three-column energy-level diagram of the helium 1s2s configuration. Column 1 (unperturbed): single degenerate level at E₀. Column 2 (Coulomb shift J): single level displaced up by J. Column 3 (exchange split ±K): two levels — parahelium (S=0, singlet) at E₀+J+K, and orthohelium (S=1, triplet) at E₀+J−K. Orthohelium below parahelium by 2K ≈ 0.8 eV.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="08-identical-particles" figure-number="03" figure-title="Helium Singlet Triplet Splitting" figure-slug="helium-singlet-triplet" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/08-identical-particles-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Helium 1s2s — Direct (J) and Exchange (K) Energy Corrections</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Parahelium (singlet, S=0) sits 0.8 eV above orthohelium (triplet, S=1). The split is 2K — pure exchange energy.</text>

  <!-- Column headers -->
  <text x="150" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">unperturbed</text>
  <text x="350" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">+ direct J</text>
  <text x="550" y="100" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">+ exchange ± K</text>

  <!-- Reference E₀ line -->
  <line x1="80" y1="280" x2="620" y2="280" stroke="#aaa" stroke-width="0.6" stroke-dasharray="4 3"/>
  <text x="650" y="284" font-family="'JetBrains Mono', monospace" font-size="9" fill="#aaa">E₀</text>

  <!-- Column 1: single level at y=280 (E₀) -->
  <line x1="90" y1="280" x2="210" y2="280" stroke="#2a1a0e" stroke-width="3"/>
  <text x="150" y="298" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">1s2s (degenerate)</text>

  <!-- Connection from col1 to col2 -->
  <line x1="210" y1="280" x2="290" y2="220" stroke="#999" stroke-width="0.8"/>

  <!-- Column 2: single level at y=220 (E₀ + J) -->
  <line x1="290" y1="220" x2="410" y2="220" stroke="#2a1a0e" stroke-width="3"/>
  <text x="350" y="238" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a1a0e">E₀ + J</text>

  <!-- Connection col2 to col3 (split) -->
  <line x1="410" y1="220" x2="490" y2="160" stroke="#999" stroke-width="0.8"/>
  <line x1="410" y1="220" x2="490" y2="320" stroke="#999" stroke-width="0.8"/>

  <!-- Column 3: parahelium at y=160 (E₀ + J + K) -->
  <line x1="490" y1="160" x2="610" y2="160" stroke="#009E73" stroke-width="3.5"/>
  <text x="550" y="148" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#009E73">parahelium  S = 0</text>
  <text x="550" y="178" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#009E73">E₀ + J + K  (−58.4 eV)</text>

  <!-- Column 3: orthohelium at y=320 (E₀ + J − K) -->
  <line x1="490" y1="320" x2="610" y2="320" stroke="#D55E00" stroke-width="3.5"/>
  <text x="550" y="340" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#D55E00">orthohelium  S = 1</text>
  <text x="550" y="354" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#D55E00">E₀ + J − K  (−59.2 eV)</text>

  <!-- Splitting annotation -->
  <line x1="475" y1="160" x2="475" y2="320" stroke="#C8860E" stroke-width="1.5"/>
  <line x1="470" y1="160" x2="480" y2="160" stroke="#C8860E" stroke-width="1.5"/>
  <line x1="470" y1="320" x2="480" y2="320" stroke="#C8860E" stroke-width="1.5"/>
  <text x="445" y="244" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#C8860E">2K</text>
  <text x="445" y="258" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#C8860E">≈ 0.8 eV</text>

  <text x="350" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Aligned spins sit further apart — and therefore lower in Coulomb energy. Exchange does the work.</text>
</svg>
