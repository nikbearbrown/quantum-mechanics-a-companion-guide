<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">P(r) = (4/a₀³) r² e^(−2r/a₀) — Peaked at a₀, Average at 3a₀/2</title>
  <desc>Radial probability density P(r) versus r/a₀. Sky-blue curve peaked at r = a₀ then falling. Vermillion vertical line at r=a₀ labeled "most probable: a₀"; second vermillion vertical line at r=3a₀/2 labeled "average: 3a₀/2". Light gray tail-shading from a₀ to 5a₀ shows the asymmetry that pulls the mean to the right of the mode.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="06-the-hydrogen-atom" figure-number="04" figure-title="1s Radial Probability Density" figure-slug="1s-radial-probability" figure-type="quantitative" priority="Critical" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/06-the-hydrogen-atom-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">P(r) = 4r<tspan baseline-shift="super" font-size="7">2</tspan>/a₀<tspan baseline-shift="super" font-size="7">3</tspan> · e<tspan baseline-shift="super" font-size="7">−2r/a₀</tspan> — Peak at a₀, Mean at 3a₀/2</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">The orbit picture requires both markers to be at the same place. They are not.</text>

  <!-- Axes -->
  <line x1="100" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <text x="668" y="344" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">r / a₀</text>
  <text x="92" y="98" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">P(r)</text>

  <!-- x ticks -->
  <g font-family="'JetBrains Mono', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="100" y="358">0</text>
    <text x="212" y="358">1</text>
    <text x="324" y="358">2</text>
    <text x="436" y="358">3</text>
    <text x="548" y="358">4</text>
    <text x="660" y="358">5</text>
  </g>

  <!-- Light gray tail shading (r > a₀ region) -->
  <path d="M 212 130 Q 268 165 324 220 Q 380 270 436 300 Q 492 318 548 328 Q 604 333 660 338 L 660 340 L 212 340 Z" fill="#bbbbbb" fill-opacity="0.18" stroke="none"/>

  <!-- P(r) curve: 0 at r=0, peak at a₀ (x=212), exponential decay -->
  <path d="M 100 340 Q 156 250 212 130 Q 268 165 324 220 Q 380 270 436 300 Q 492 318 548 328 Q 604 333 660 338" stroke="#56B4E9" stroke-width="2.4" fill="none"/>

  <!-- Vertical markers -->
  <line x1="212" y1="340" x2="212" y2="100" stroke="#D55E00" stroke-width="1.8"/>
  <text x="216" y="116" font-family="'JetBrains Mono', monospace" font-size="11" fill="#D55E00">most probable: a₀</text>

  <line x1="268" y1="340" x2="268" y2="100" stroke="#D55E00" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text x="272" y="136" font-family="'JetBrains Mono', monospace" font-size="11" fill="#D55E00">average: 3a₀/2</text>

  <text x="370" y="402" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">The r<tspan baseline-shift="super" font-size="8">2</tspan> Jacobian punishes small radii and rewards large ones. Mode ≠ mean.</text>
</svg>
