<!--
  Madelung Diagonal-Filling Rule
  Book: Quantum Mechanics — A Companion Guide · Chapter: 08-identical-particles · Figure: 04
-->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Madelung Rule — Diagonal Filling by Increasing (n + ℓ)</title>
  <desc>Grid diagram with n=1..6 as rows and ℓ ∈ {s, p, d, f} as columns. Orbital labels (1s, 2s, 2p, 3s, 3p, 3d, 4s, 4p, 4d, 4f, 5s, 5p, 5d, 6s, 6p) in cells. Orange diagonal arrows trace the standard filling order: 1s → 2s → 2p → 3s → 3p → 4s → 3d → 4p → 5s → 4d → 5p → 6s → 4f → 5d → 6p.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="08-identical-particles" figure-number="04" figure-title="Madelung Filling Rule" figure-slug="madelung-filling" figure-type="reference" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/08-identical-particles-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Madelung Rule — Fill Orbitals by Diagonals of Constant (n + ℓ)</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">Within each diagonal, fill by smaller n first. The whole pattern is a consequence of effective nuclear charge.</text>

  <!-- Column headers -->
  <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#2a1a0e" text-anchor="middle">
    <text x="180" y="100">s (ℓ=0)</text>
    <text x="300" y="100">p (ℓ=1)</text>
    <text x="420" y="100">d (ℓ=2)</text>
    <text x="540" y="100">f (ℓ=3)</text>
  </g>

  <!-- Row labels and cells -->
  <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#2a1a0e" text-anchor="middle">
    <!-- n=1 -->
    <text x="100" y="138" text-anchor="end">n=1</text>
    <rect x="130" y="120" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="180" y="146">1s</text>

    <!-- n=2 -->
    <text x="100" y="188" text-anchor="end">n=2</text>
    <rect x="130" y="170" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="180" y="196">2s</text>
    <rect x="250" y="170" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="300" y="196">2p</text>

    <!-- n=3 -->
    <text x="100" y="238" text-anchor="end">n=3</text>
    <rect x="130" y="220" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="180" y="246">3s</text>
    <rect x="250" y="220" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="300" y="246">3p</text>
    <rect x="370" y="220" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="420" y="246">3d</text>

    <!-- n=4 -->
    <text x="100" y="288" text-anchor="end">n=4</text>
    <rect x="130" y="270" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="180" y="296">4s</text>
    <rect x="250" y="270" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="300" y="296">4p</text>
    <rect x="370" y="270" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="420" y="296">4d</text>
    <rect x="490" y="270" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="540" y="296">4f</text>

    <!-- n=5 -->
    <text x="100" y="338" text-anchor="end">n=5</text>
    <rect x="130" y="320" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="180" y="346">5s</text>
    <rect x="250" y="320" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="300" y="346">5p</text>
    <rect x="370" y="320" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="420" y="346">5d</text>

    <!-- n=6 -->
    <text x="100" y="388" text-anchor="end">n=6</text>
    <rect x="130" y="370" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="180" y="396">6s</text>
    <rect x="250" y="370" width="100" height="40" fill="#FFFFFF" stroke="#aaa" stroke-width="0.7"/>
    <text x="300" y="396">6p</text>
  </g>

  <!-- Diagonal filling arrows (orange) -->
  <g stroke="#E69F00" stroke-width="1.4" fill="none">
    <!-- 1s -> 2s -->
    <line x1="180" y1="160" x2="180" y2="170"/>
    <!-- 2s -> 2p -->
    <line x1="230" y1="190" x2="250" y2="190"/>
    <!-- 2p -> 3s (diagonal) -->
    <line x1="280" y1="210" x2="180" y2="220"/>
    <!-- 3s -> 3p -->
    <line x1="230" y1="240" x2="250" y2="240"/>
    <!-- 3p -> 4s (diagonal) -->
    <line x1="280" y1="260" x2="180" y2="270"/>
    <!-- 4s -> 3d (diagonal) -->
    <line x1="230" y1="290" x2="370" y2="240"/>
    <!-- 3d -> 4p -->
    <line x1="470" y1="240" x2="280" y2="290"/>
    <!-- 4p -> 5s -->
    <line x1="280" y1="290" x2="180" y2="320"/>
    <!-- 5s -> 4d -->
    <line x1="230" y1="340" x2="370" y2="290"/>
    <!-- 4d -> 5p -->
    <line x1="470" y1="290" x2="280" y2="340"/>
    <!-- 5p -> 6s -->
    <line x1="280" y1="340" x2="180" y2="370"/>
    <!-- 6s -> 4f -->
    <line x1="230" y1="390" x2="490" y2="290"/>
    <!-- 4f -> 5d -->
    <line x1="590" y1="290" x2="370" y2="340"/>
    <!-- 5d -> 6p -->
    <line x1="470" y1="340" x2="280" y2="390"/>
  </g>

  <!-- arrowheads on long diagonals (fill direction) -->
  <g fill="#E69F00">
    <polygon points="180,220 186,212 189,221"/>
    <polygon points="370,240 362,242 369,249"/>
    <polygon points="490,290 482,292 489,299"/>
  </g>
  <text x="600" y="430" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#E69F00">fill direction: ↘ along each diagonal</text>
  <text x="350" y="450" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Quantum statistics, Coulomb energy, and one filling rule — three centuries of chemistry.</text>
</svg>
