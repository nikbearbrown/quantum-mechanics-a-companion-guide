<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title">
  <title id="fig-title">Robertson 1929 — Five-Step Proof Structure</title>
  <desc>Vertical flowchart showing the logical structure of the Robertson uncertainty proof: 1. Define shifted operators (zero-mean), 2. Build two Hilbert-space vectors, 3. Apply Cauchy-Schwarz, 4. Discard real part keep imaginary, 5. Commutator appears. Step 5 highlighted in orange as the punchline. Side branch from step 4 notes "Schrödinger 1930 strengthening keeps the real part too".</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Quantum Mechanics — A Companion Guide" book-slug="quantum-mechanics-a-companion-guide" chapter="05-quantum-formalism" figure-number="01" figure-title="Robertson Proof Structure" figure-slug="robertson-proof-structure" figure-type="conceptual" priority="Important" author="Humanitarians AI" date-generated="2026-05-26" source-file="pantry/05-quantum-formalism-cajal.md"/></metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>
  <text x="32" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Robertson's Uncertainty Inequality — Five Logical Steps</text>
  <text x="32" y="56" font-family="'Inter', sans-serif" font-size="11" fill="#545454">σ<tspan baseline-shift="sub" font-size="8">A</tspan> · σ<tspan baseline-shift="sub" font-size="8">B</tspan> ≥ ½ |⟨[A, B]⟩|. The whole derivation is Cauchy–Schwarz applied to two carefully chosen vectors.</text>

  <!-- Step 1 -->
  <rect x="220" y="90" width="260" height="50" fill="#FFFFFF" stroke="#aaa" stroke-width="1.2" rx="4"/>
  <text x="350" y="111" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">step 1</text>
  <text x="350" y="128" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">define shifted operators (zero-mean)</text>

  <line x1="350" y1="140" x2="350" y2="160" stroke="#2a1a0e" stroke-width="1.2"/>
  <polygon points="350,160 346,154 354,154" fill="#2a1a0e"/>

  <!-- Step 2 -->
  <rect x="220" y="160" width="260" height="50" fill="#FFFFFF" stroke="#aaa" stroke-width="1.2" rx="4"/>
  <text x="350" y="181" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">step 2</text>
  <text x="350" y="198" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">build two Hilbert-space vectors |f⟩, |g⟩</text>

  <line x1="350" y1="210" x2="350" y2="230" stroke="#2a1a0e" stroke-width="1.2"/>
  <polygon points="350,230 346,224 354,224" fill="#2a1a0e"/>

  <!-- Step 3 -->
  <rect x="220" y="230" width="260" height="50" fill="#FFFFFF" stroke="#aaa" stroke-width="1.2" rx="4"/>
  <text x="350" y="251" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">step 3</text>
  <text x="350" y="268" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">apply Cauchy–Schwarz inequality</text>

  <line x1="350" y1="280" x2="350" y2="300" stroke="#2a1a0e" stroke-width="1.2"/>
  <polygon points="350,300 346,294 354,294" fill="#2a1a0e"/>

  <!-- Step 4 with branch -->
  <rect x="220" y="300" width="260" height="50" fill="#FFFFFF" stroke="#aaa" stroke-width="1.2" rx="4"/>
  <text x="350" y="321" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#545454">step 4</text>
  <text x="350" y="338" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">use |z|<tspan baseline-shift="super" font-size="8">2</tspan> ≥ (Im z)<tspan baseline-shift="super" font-size="8">2</tspan> — keep imaginary part</text>

  <!-- Branch -->
  <line x1="480" y1="325" x2="540" y2="325" stroke="#56B4E9" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="540" y="305" width="140" height="40" fill="#FFFFFF" stroke="#56B4E9" stroke-width="0.8" rx="4"/>
  <text x="610" y="320" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#0072B2">Schrödinger 1930:</text>
  <text x="610" y="334" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#0072B2">keep both → stronger bound</text>

  <line x1="350" y1="350" x2="350" y2="370" stroke="#2a1a0e" stroke-width="1.2"/>
  <polygon points="350,370 346,364 354,364" fill="#2a1a0e"/>

  <!-- Step 5 — punchline -->
  <rect x="200" y="370" width="300" height="50" fill="#FFFFFF" stroke="#E69F00" stroke-width="2" rx="4"/>
  <text x="350" y="391" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#C8860E">step 5 — punchline</text>
  <text x="350" y="408" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#2a1a0e">commutator [A, B] appears</text>

  <text x="350" y="448" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#C8102E" font-style="italic">Cauchy–Schwarz plus "take the imaginary part." That is the whole proof.</text>
</svg>
